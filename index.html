<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vipers Sub Tracker v2.5</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2B5BE8;--blue-dark:#1A3BAD;--blue-deep:#0F2470;--blue-light:#5B82F0;
  --blue-pale:#E8EEFB;--blue-muted:#C0CEFA;
  --off-white:#F4F6FC;--gray-light:#E8ECF5;--gray-mid:#8A96BB;--gray-dark:#3A4060;--text:#0D1333;
  --green:#0FA86A;--green-pale:#DDF5EC;--green-dark:#085C3A;
  --amber:#E8900A;--amber-pale:#FDF0D8;--amber-dark:#7A4A00;
  --red:#D63030;--red-pale:#FBEAEA;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--off-white);font-family:"Barlow",sans-serif;color:var(--text)}
body{overflow-x:hidden}
#setup-screen{min-height:100vh;padding-bottom:40px}
.setup-header{background:var(--blue-deep);padding:24px 16px 20px;text-align:center}
.setup-header img{width:60px;margin-bottom:8px}
.setup-header h1{font-family:"Barlow Condensed",sans-serif;font-size:26px;font-weight:800;color:#fff;letter-spacing:1px;text-transform:uppercase}
.setup-header p{font-size:13px;color:var(--blue-muted);margin-top:4px}
.setup-body{padding:16px;max-width:480px;margin:0 auto}
.group-section{background:#fff;border-radius:12px;margin-bottom:14px;overflow:hidden;border:1px solid var(--gray-light)}
.gs-header{background:var(--blue);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.gs-header h2{font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:16px;color:#fff;text-transform:uppercase;letter-spacing:.5px}
.gs-meta{font-size:11px;color:var(--blue-muted)}
.star-note{background:#FDF0D8;color:#7A4A00;font-size:11px;font-weight:600;padding:6px 14px;border-bottom:1px solid #F5D49A;}.absent-note{background:var(--red-pale);color:var(--red);font-size:11px;font-weight:600;padding:6px 14px;border-bottom:1px solid #F7C1C1;}
.player-inputs{padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.piwrap{display:flex;flex-direction:column;gap:3px}
.piwrap label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.piwrap.starter label{color:var(--blue)}.piwrap.extra-mins label{color:var(--amber);}
.piwrap.starter label:has(★){color:var(--amber)}
.piwrap.sub-p label{color:var(--amber)}
input[type=text]{border:1.5px solid var(--gray-light);border-radius:8px;padding:8px 10px;font-size:14px;font-family:"Barlow",sans-serif;color:var(--text);background:var(--off-white);width:100%;outline:none;transition:border-color .15s}
input[type=text]:focus{border-color:var(--blue);background:#fff}
.start-btn{display:block;width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:16px;font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:1px;cursor:pointer;margin-top:8px}
.start-btn:active{background:var(--blue-dark);transform:scale(.98)}
#game-screen{display:none;min-height:100vh;flex-direction:column}
.game-header{background:var(--blue-deep);padding:10px 12px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.header-top img{width:36px;flex-shrink:0}
.header-team{flex:1}
.header-team h1{font-family:"Barlow Condensed",sans-serif;font-size:18px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.5px;line-height:1}
.header-team p{font-size:10px;color:var(--blue-muted);margin-top:1px}
.clock-display{font-family:"Barlow Condensed",sans-serif;font-size:38px;font-weight:800;color:#fff;letter-spacing:2px;cursor:pointer;line-height:1;min-width:90px}
.clock-display.warning{color:var(--amber)}
.clock-display.urgent{color:#FF6B6B}
.clock-edit-input{font-family:"Barlow Condensed",sans-serif;font-size:32px;font-weight:800;color:#fff;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.4);border-radius:8px;width:110px;padding:2px 6px;letter-spacing:2px;outline:none}
.header-btns{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.ctrl-btn{border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;border-radius:8px;padding:5px 10px;font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;white-space:nowrap}
.ctrl-btn.pause-active{background:var(--amber);border-color:var(--amber)}
.progress-bar{height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue-light);border-radius:2px;transition:width .5s}
.player-counts{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.count-pill{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.12);color:var(--blue-muted)}
.count-pill.ok{background:rgba(15,168,106,.25);color:#7DFFC4}
.count-pill.warn{background:rgba(232,144,10,.3);color:#FFD080}
.game-body{padding:10px;flex:1}
.resume-banner{background:#0F6E56;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.resume-banner p{font-size:13px;color:#fff;font-weight:500}
.resume-banner button{border:none;background:rgba(255,255,255,.2);color:#fff;border-radius:8px;padding:6px 12px;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.group-block{margin-bottom:12px;background:#fff;border-radius:12px;overflow:hidden;border:1px solid var(--gray-light)}
.group-bar{background:var(--blue);padding:8px 10px;display:flex;align-items:center;gap:8px}
.gb-title{font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.5px;flex:1}
.gb-meta{font-size:10px;color:rgba(255,255,255,.55)}
.countdown-pill{font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;padding:3px 9px;border-radius:6px;background:rgba(255,255,255,.15);color:#fff;letter-spacing:.5px;white-space:nowrap}
.countdown-pill.soon{background:rgba(232,144,10,.7);color:#fff}
.countdown-pill.due{background:var(--red);color:#fff;animation:pulse-red 0.8s infinite}
@keyframes pulse-red{0%,100%{opacity:1}50%{opacity:.6}}
.rotate-btn{display:flex;align-items:center;gap:6px;border:1.5px solid rgba(255,255,255,.3);border-radius:8px;padding:6px 12px;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:800;cursor:pointer;text-transform:uppercase;letter-spacing:.4px;background:rgba(255,255,255,.15);color:#fff;white-space:nowrap}
.rotate-btn.due{background:var(--amber);border-color:var(--amber);color:#fff;animation:pulse-amber 1.2s infinite}
.rotate-btn:active{transform:scale(.96)}
@keyframes pulse-amber{0%,100%{box-shadow:0 0 0 0 rgba(232,144,10,.6)}50%{box-shadow:0 0 0 8px rgba(232,144,10,0)}}
.next-strip{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--gray-light)}
.next-cell{padding:7px 10px}
.next-cell.nc-off{background:var(--amber-pale);border-right:1px solid var(--gray-light)}
.next-cell.nc-on{background:var(--blue-pale)}
.next-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.nc-off .next-label{color:var(--amber)}
.nc-on .next-label{color:var(--blue)}
.next-name-row{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.nbadge{font-size:9px;font-weight:800;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nc-off .nbadge{background:var(--amber);color:#fff}
.nc-on .nbadge{background:var(--blue);color:#fff}
.next-name{font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;color:var(--text)}
.next-time{font-size:10px;color:var(--gray-mid);margin-left:auto;padding-left:4px}
.next-none{font-size:12px;color:var(--gray-mid);font-style:italic}
.players-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--gray-light)}
.player-card{background:#fff;padding:10px 11px;cursor:pointer;user-select:none;position:relative}
.player-card:active{opacity:.8}
.player-card.s-on{background:#F2FBF7}
.player-card.s-nextoff{background:var(--amber-pale)}
.player-card.s-nexton{background:var(--blue-pale)}
.player-card.s-bench{background:var(--off-white)}
.pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.pc-name{font-family:"Barlow Condensed",sans-serif;font-size:17px;font-weight:700;color:var(--text)}
.pcdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dots-wrap{display:flex;gap:3px;align-items:center;flex-shrink:0}
.d-on{background:var(--green)}
.d-nextoff{background:var(--amber);box-shadow:0 0 0 3px rgba(232,144,10,.25)}
.d-nexton{background:var(--blue);box-shadow:0 0 0 3px rgba(43,91,232,.2)}
.d-bench{background:var(--gray-light);border:1.5px solid var(--gray-mid)}
.pc-times{font-size:11px;color:var(--gray-mid);line-height:1.4}
.pc-status{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.st-on{color:var(--green)}.st-nextoff{color:var(--amber-dark)}.st-nexton{color:var(--blue-dark)}.st-bench{color:var(--gray-mid)}
.timebar{margin-top:5px;height:3px;background:var(--gray-light);border-radius:2px;overflow:hidden}
.timebar-fill{height:100%;border-radius:2px;transition:width .5s}
.tf-green{background:var(--green)}.tf-amber{background:var(--amber)}.tf-blue{background:var(--blue-light)}.tf-gray{background:var(--gray-mid)}
.log-block{background:#fff;border-radius:12px;border:1px solid var(--gray-light);overflow:hidden;margin-bottom:10px}
.log-header{padding:8px 12px;background:var(--gray-dark)}
.log-header h3{font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;color:#fff;text-transform:uppercase}
.log-inner{max-height:160px;overflow-y:auto}
.log-row{display:flex;gap:8px;align-items:center;padding:6px 12px;border-bottom:1px solid var(--gray-light);font-size:12px}
.log-row:last-child{border-bottom:none}
.log-t{font-family:"Barlow Condensed",sans-serif;font-weight:700;color:var(--blue);font-size:13px;min-width:36px}
.log-msg{color:var(--gray-dark);flex:1}
.log-icon{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:700}
.li-on{background:var(--green-pale);color:var(--green-dark)}.li-off{background:var(--red-pale);color:var(--red)}.li-sys{background:var(--blue-pale);color:var(--blue)}.li-rot{background:var(--amber-pale);color:var(--amber-dark)}
.action-row{display:flex;gap:8px;margin-bottom:10px}
.action-btn{flex:1;padding:12px 8px;border-radius:10px;border:none;font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;cursor:pointer}
.action-btn:active{transform:scale(.97)}
.btn-undo{background:var(--amber-pale);color:var(--amber-dark)}
.btn-export{background:var(--green-pale);color:var(--green-dark)}
.btn-reset{background:var(--red-pale);color:var(--red)}
.lock-overlay{position:fixed;inset:0;background:rgba(13,19,51,.55);z-index:200;display:flex;align-items:center;justify-content:center}
.lock-msg{background:#fff;border-radius:14px;padding:20px 24px;text-align:center;font-family:"Barlow Condensed",sans-serif;font-size:20px;font-weight:700;color:var(--blue-dark)}
.lock-msg p{font-family:"Barlow",sans-serif;font-size:13px;color:var(--gray-mid);margin-top:4px}
.dev-toggle{text-align:center;padding:6px}
.dev-toggle button{border:none;background:none;font-size:11px;color:var(--gray-mid);cursor:pointer;text-decoration:underline}
.dev-panel{background:var(--gray-dark);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.dev-panel h4{font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;color:var(--blue-muted);text-transform:uppercase;margin-bottom:8px}
.speed-btns{display:flex;gap:6px;margin-bottom:10px}
.speed-btn{flex:1;padding:7px 4px;border-radius:7px;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:var(--gray-mid);font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:center}
.speed-btn.active{border-color:var(--blue-light);background:rgba(91,130,240,.2);color:var(--blue-light)}
.test-sound-btn{width:100%;padding:9px;border-radius:8px;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.4px}
.fulltime-banner{background:var(--blue-deep);text-align:center;padding:14px;margin-bottom:10px;border-radius:10px}
.fulltime-banner h2{font-family:"Barlow Condensed",sans-serif;font-size:28px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:2px}
.fulltime-banner p{font-size:12px;color:var(--blue-muted);margin-top:2px}
@media(min-width:480px){.players-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>

    </div>
    <div id="groups-area"></div>
    <div class="action-row">
      <button class="action-btn btn-undo" onclick="undoSub()">↩ Undo</button>
      <button class="action-btn btn-export" onclick="exportData()">Export</button>
      <button class="action-btn btn-reset" onclick="resetGame()">Reset</button>
    </div>
    <div class="log-block">
      <div class="log-header"><h3>Sub Log</h3></div>
      <div class="log-inner" id="log-inner"></div>
    </div>
    <div class="dev-toggle"><button onclick="toggleDev()">⚙ Test / Dev panel</button></div>
    <div class="dev-panel" id="dev-panel" style="display:none">
      <h4>Game Speed</h4>
      <div class="speed-btns">
        <button class="speed-btn active" onclick="setSpeed(1)" id="spd-1">1×</button>
        <button class="speed-btn" onclick="setSpeed(5)" id="spd-5">5×</button>
        <button class="speed-btn" onclick="setSpeed(10)" id="spd-10">10×</button>
        <button class="speed-btn" onclick="setSpeed(30)" id="spd-30">30×</button>
      </div>
      <button class="test-sound-btn" onclick="testBeep()">🔊 Test Sound + Vibrate</button>
    </div>
  </div>
</div>

<div class="lock-overlay" id="lock-overlay" style="display:none" onclick="unlockScreen()">
  <div class="lock-msg">🔒 Screen Locked<p>Tap anywhere to unlock</p></div>
</div>

<script>
const GAME_SECS = 50 * 60;
const SAVE_KEY  = 'vipers_game_v25';
const GROUPS = [
  { id:'fwd',   name:'Forwards',     onField:4, subs:3, rotMins:8,  rotCount:3, maxOn:4 },
  { id:'ib',    name:'Inside Backs', onField:4, subs:1, rotMins:10, rotCount:1, maxOn:4 },
  { id:'wings', name:'Wings',        onField:1, subs:1, rotMins:8,  rotCount:1, maxOn:1 },
];
const DEFAULT_NAMES = {
  fwd:   ['Jack','Theo','Havea','Callum','AJ','Marlo','Drew'],
  ib:    ['Noah','James','Micaiah','Arlo','Nate'],
  wings: ['Cyrus','Louis'],
};

// ── STATE ──
// stintStart is game-time in seconds when player came on (not wall-clock)
let S = {
  players:{}, gameTime:0, running:false, paused:false,
  pausedAt:null,
  startedAt:null,
  baseGameTime:0,
  lastRotation:{fwd:0, ib:0, wings:0},
  groupConfig:{},  // adjusted onField/rotCount after absent players removed
  log:[], locked:false, halfDone:false, speed:1, history:[]
};
let ticker = null;
let audioCtx = null;
// Per-group alert state: track which rotation index has already beeped
// key = groupId, value = last rotationIndex that fired (increments each rotation)
let alertFired = { fwd:false, ib:false, wings:false };

// ── AUDIO ──
function unlockAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Unlock iOS with a silent buffer
    const buf = audioCtx.createBuffer(1, 1, 22050);
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
  } catch(e) { audioCtx = null; }
}

function playBeep() {
  try {
    if (!audioCtx) { unlockAudio(); }
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    // Three clear rising tones
    [[523,0],[659,0.22],[784,0.44]].forEach(([freq, delay]) => {
      const osc = audioCtx.createOscillator();
      const env = audioCtx.createGain();
      osc.connect(env); env.connect(audioCtx.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      env.gain.setValueAtTime(0, now + delay);
      env.gain.linearRampToValueAtTime(0.5, now + delay + 0.03);
      env.gain.setValueAtTime(0.5, now + delay + 0.12);
      env.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.22);
      osc.start(now + delay);
      osc.stop(now + delay + 0.25);
    });
  } catch(e) { console.warn('Audio:', e); }
}

function testBeep() { unlockAudio(); playBeep(); if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]); }

// ── SETUP SCREEN ──
function buildSetup() {
  let html = '';
  GROUPS.forEach(g => {
    const total = g.onField + g.subs;
    const starNote = g.id === 'fwd'
      ? `<div class="star-note">★ These positions get ~6 extra mins. Rotate different players in each week.</div>`
      : '';
    html += `<div class="group-section">
      <div class="gs-header">
        <h2>${g.name}</h2>
        <span class="gs-meta">${g.onField} on · ${g.subs} sub${g.subs>1?'s':''} · ~${g.rotMins}min</span>
      </div>${starNote}<div class="player-inputs">`;
    for (let i = 0; i < total; i++) {
      const isStarter = i < g.onField;
      const extraMins = (g.id === 'fwd' && (i === 2 || i === 3 || i === 6));
      const baseLbl = isStarter ? 'Starter '+(i+1) : 'Sub '+(i-g.onField+1);
      const lbl = extraMins ? baseLbl + ' ★' : baseLbl;
      const extraCls = extraMins ? ' extra-mins' : '';
      html += `<div class="piwrap ${isStarter?'starter':'sub-p'}${extraCls}">
        <label>${lbl}</label>
        <input type="text" id="inp_${g.id}_${i}" value="${DEFAULT_NAMES[g.id][i]||''}" placeholder="Player name">
      </div>`;
    }
    html += `</div></div>`;
  });
  document.getElementById('setup-groups').innerHTML = html;
}

// ── WALL-CLOCK HELPERS ──
// Current game time in seconds, computed from wall clock
function liveGameTime() {
  if (!S.running || S.paused) return S.gameTime;
  const elapsed = Math.floor((Date.now() - S.startedAt) / 1000) * S.speed;
  return Math.min(S.baseGameTime + elapsed, GAME_SECS);
}

// Current stint seconds for a player, using wall-clock stintStart
function currentSecs(p) {
  if (!p.onField || p.stintStart === null) return p.totalSecs;
  return p.totalSecs + Math.max(0, liveGameTime() - p.stintStart);
}

function stintSecs(p) {
  if (!p.onField || p.stintStart === null) return 0;
  return Math.max(0, liveGameTime() - p.stintStart);
}

// ── GAME START ──
function startGame() {
  unlockAudio();
  const now = Date.now();
  S = {
    players:{}, gameTime:0, running:true, paused:false,
    pausedAt:null, startedAt:now, baseGameTime:0,
    log:[{t:0,msg:'Kick off!',type:'sys'}],
    locked:false, halfDone:false, speed:1, history:[]
  };
  alertFired = { fwd:false, ib:false, wings:false };
  S.lastRotation = { fwd:0, ib:0, wings:0 };
  GROUPS.forEach(g => {
    for (let i = 0; i < g.onField + g.subs; i++) {
      const name = document.getElementById(`inp_${g.id}_${i}`)?.value.trim() || `P${i+1}`;
      const id = `${g.id}_${i}`;
      S.players[id] = {
        id, group:g.id, name,
        onField: i < g.onField,
        totalSecs: 0,
        stintStart: i < g.onField ? 0 : null  // game seconds at kickoff
      };
    }
  });
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('halftime-btn').style.display = 'block';
  document.getElementById('fulltime-banner').style.display = 'none';
  document.getElementById('pause-btn').style.display = 'block';
  document.getElementById('pause-btn').textContent = 'Pause';
  document.getElementById('pause-btn').classList.remove('pause-active');
  document.getElementById('resume-banner').style.display = 'none';
  saveState();
  startTicker();
  render();
}

// ── TICKER ──
function startTicker() {
  clearInterval(ticker);
  ticker = setInterval(() => {
    if (!S.running || S.paused) return;
    S.gameTime = liveGameTime();
    if (S.gameTime >= GAME_SECS) { S.gameTime = GAME_SECS; endGame(); return; }
    // Auto-pause at half time (25 mins)
    if (!S.halfDone && S.gameTime >= 25 * 60) { doHalftime(); return; }
    checkAlerts();
    saveState();
    render();
  }, 500); // 500ms for snappier display
}

function endGame() {
  S.running = false; clearInterval(ticker);
  Object.values(S.players).forEach(p => {
    if (p.onField && p.stintStart !== null) {
      p.totalSecs += Math.max(0, S.gameTime - p.stintStart);
      p.stintStart = null;
    }
  });
  S.log.unshift({t:S.gameTime, msg:'Full time!', type:'sys'});
  document.getElementById('fulltime-banner').style.display = 'block';
  document.getElementById('pause-btn').style.display = 'none';
  document.getElementById('halftime-btn').style.display = 'none';
  saveState();
  render();
}

// ── ALERT LOGIC (FIXED) ──
// Only fires beep when rotation is actually due AND hasn't already fired for this rotation cycle
function checkAlerts() {
  GROUPS.forEach(g => {
    const due = isRotationDue(g);
    if (due && !alertFired[g.id]) {
      alertFired[g.id] = true;
      // Vibrate: triple pulse — works from timer on all mobile browsers
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
    }
    if (!due) alertFired[g.id] = false;
  });
}

// ── ROTATION DUE ──
function isRotationDue(g) {
  const cfg = gcfg(g.id);
  if (cfg.rotCount === 0) return false;
  const timeSinceLastRot = S.gameTime - (S.lastRotation[g.id] || 0);
  if (timeSinceLastRot < (cfg.rotMins * 60) - 2) return false;
  const nextOff = getNextOff(g.id, cfg.rotCount);
  if (nextOff.length === 0) return false;
  return stintSecs(nextOff[0]) >= (cfg.rotMins * 60) - 2;
}

// ── NEXT OFF / ON ──
function gcfg(groupId) {
  const base = GROUPS.find(g => g.id === groupId);
  return (S.groupConfig && S.groupConfig[groupId]) || { onField: base.onField, rotCount: base.rotCount, rotMins: base.rotMins };
}

function getNextOff(groupId, count) {
  return Object.values(S.players)
    .filter(p => p.group === groupId && p.onField && p.stintStart !== null)
    .map(p => ({ p, stint: stintSecs(p) }))
    .sort((a,b) => b.stint - a.stint)
    .slice(0, count)
    .map(x => x.p);
}
function getNextOn(groupId, count) {
  return Object.values(S.players)
    .filter(p => p.group === groupId && !p.onField)
    .map(p => ({ p, total: p.totalSecs }))
    .sort((a,b) => a.total - b.total)
    .slice(0, count)
    .map(x => x.p);
}

// ── AUTO ROTATE ──
function doRotate(groupId) {
  if (S.locked) { document.getElementById('lock-overlay').style.display='flex'; return; }
  const g = GROUPS.find(g => g.id === groupId);
  const cfg = gcfg(groupId);
  const off = getNextOff(groupId, cfg.rotCount);
  const on  = getNextOn(groupId, cfg.rotCount);
  if (!off.length || !on.length) { toast('No rotation available'); return; }
  S.history.push(JSON.parse(JSON.stringify(S.players)));
  const gt = liveGameTime();
  const names = [];
  off.forEach(p => {
    if (p.stintStart !== null) p.totalSecs += Math.max(0, gt - p.stintStart);
    p.stintStart = null; p.onField = false;
    names.push(p.name+' off');
  });
  on.forEach(p => {
    p.onField = true; p.stintStart = gt;
    names.push(p.name+' on');
  });
  alertFired[groupId] = false;
  S.lastRotation[groupId] = S.gameTime; // restart rotation window
  S.log.unshift({t:S.gameTime, msg:'Rotation: '+names.join(', '), type:'rot'});
  saveState(); render();
}

// ── MANUAL TOGGLE ──
function togglePlayer(pid) {
  if (S.locked) { document.getElementById('lock-overlay').style.display='flex'; return; }
  if (!S.running && S.gameTime >= GAME_SECS) return;
  const p = S.players[pid];
  const g = GROUPS.find(g => g.id === p.group);
  const onCount = Object.values(S.players).filter(x => x.group===p.group && x.onField).length;
  S.history.push(JSON.parse(JSON.stringify(S.players)));
  const gt = liveGameTime();
  if (p.onField) {
    if (p.stintStart !== null) p.totalSecs += Math.max(0, gt - p.stintStart);
    p.stintStart = null; p.onField = false;
    S.log.unshift({t:S.gameTime, msg:`${p.name} off`, type:'off'});
  } else {
    const _cfg = gcfg(g.id);
    if (onCount >= _cfg.onField) { toast(`Max ${_cfg.onField} on field for ${g.name}`); S.history.pop(); return; }
    p.onField = true; p.stintStart = gt;
    S.log.unshift({t:S.gameTime, msg:`${p.name} on`, type:'on'});
  }
  // Reset alert for this group so warning clears after any sub
  alertFired[p.group] = false;
  S.lastRotation[p.group] = S.gameTime;
  saveState(); render();
}

// ── CLOCK EDIT ──
function editClock() {
  if (!S.running) return;
  const wasPaused = S.paused;
  if (!wasPaused) { S.pausedAt = Date.now(); S.paused = true; }
  document.getElementById('clock-display').style.display = 'none';
  const inp = document.getElementById('clock-input');
  inp.style.display = 'block';
  inp.value = fmtTime(S.gameTime);
  inp._wasPaused = wasPaused;
  inp.focus(); inp.select();
}
function commitClock() {
  const inp = document.getElementById('clock-input');
  const m = inp.value.trim().match(/^(\d{1,2}):(\d{2})$/);
  if (m) {
    const newT = Math.min(Math.max(0, parseInt(m[1])*60+parseInt(m[2])), GAME_SECS);
    S.gameTime = newT;
    S.baseGameTime = newT;
    S.startedAt = Date.now(); // reset wall-clock anchor
  }
  document.getElementById('clock-display').style.display = 'block';
  inp.style.display = 'none';
  if (!inp._wasPaused) { S.paused = false; S.pausedAt = null; }
  saveState(); render();
}

// ── CONTROLS ──
function togglePause() {
  if (S.paused) {
    // Resuming — shift startedAt forward by the paused duration
    S.startedAt = Date.now() - Math.floor((S.gameTime - S.baseGameTime) / S.speed) * 1000;
    S.paused = false; S.pausedAt = null;
  } else {
    S.gameTime = liveGameTime();
    S.baseGameTime = S.gameTime;
    S.pausedAt = Date.now(); S.paused = true;
  }
  document.getElementById('pause-btn').textContent = S.paused ? 'Resume' : 'Pause';
  document.getElementById('pause-btn').classList.toggle('pause-active', S.paused);
  saveState();
}
function doHalftime() {
  if (S.halfDone) return;
  S.halfDone = true;
  if (!S.paused) {
    S.gameTime = liveGameTime(); S.baseGameTime = S.gameTime;
    S.pausedAt = Date.now(); S.paused = true;
  }
  document.getElementById('pause-btn').textContent = 'Resume';
  document.getElementById('pause-btn').classList.add('pause-active');
  document.getElementById('halftime-btn').style.display = 'none';
  S.log.unshift({t:S.gameTime, msg:'Half time', type:'sys'});
  saveState(); render();
}
function undoSub() {
  if (!S.history.length) { toast('Nothing to undo'); return; }
  S.players = S.history.pop();
  if (S.log.length > 1) S.log.shift();
  saveState(); render();
}
function resetGame() {
  if (!confirm('Reset the game? This will clear everything.')) return;
  clearInterval(ticker);
  try { localStorage.removeItem(SAVE_KEY); } catch(e){}
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'block';
}
function dismissResume() {
  document.getElementById('resume-banner').style.display = 'none';
}
function lockScreen()   { S.locked=true;  document.getElementById('lock-overlay').style.display='flex'; }
function unlockScreen() { S.locked=false; document.getElementById('lock-overlay').style.display='none'; }
function toggleDev() {
  const p = document.getElementById('dev-panel');
  p.style.display = p.style.display==='none' ? 'block' : 'none';
}
function setSpeed(n) {
  // Snapshot current game time before changing speed
  S.gameTime = liveGameTime(); S.baseGameTime = S.gameTime; S.startedAt = Date.now();
  S.speed = n;
  [1,5,10,30].forEach(s => { const b=document.getElementById(`spd-${s}`); if(b) b.classList.toggle('active',s===n); });
  clearInterval(ticker); startTicker();
}
function exportData() {
  let txt = 'VIPERS SUB TRACKER v2.5\nU10 Vipers — Game Summary\n================================\n\n';
  txt += 'FINAL TIME: '+fmtTime(S.gameTime)+'\n\n';
  GROUPS.forEach(g => {
    txt += g.name.toUpperCase()+'\n';
    Object.values(S.players).filter(p=>p.group===g.id).forEach(p => {
      const t = currentSecs(p);
      txt += `  ${p.name.padEnd(14)} ${fmtMins(t)} (${fmtTime(t)})\n`;
    });
    txt += '\n';
  });
  txt += 'SUB LOG\n-------\n';
  [...S.log].reverse().forEach(e => { txt += fmtTime(e.t)+'  '+e.msg+'\n'; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
  a.download = 'vipers_game_summary.txt'; a.click();
}

// ── PERSIST / RESTORE ──
function saveState() {
  try {
    const snapshot = {
      players: S.players,
      gameTime: liveGameTime(),
      running: S.running,
      paused: S.paused,
      startedAt: S.startedAt,
      baseGameTime: S.baseGameTime,
      log: S.log.slice(0, 60),
      halfDone: S.halfDone,
      speed: S.speed,
      alertFired,
      lastRotation: S.lastRotation,
      groupConfig: S.groupConfig,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(snapshot));
  } catch(e){}
}

function tryRestore() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const snap = JSON.parse(raw);
    if (!snap.players || !Object.keys(snap.players).length) return false;
    if (snap.gameTime >= GAME_SECS) return false; // game over, no restore

    S.players     = snap.players;
    S.gameTime    = snap.gameTime;
    S.baseGameTime= snap.gameTime; // re-anchor from restored time
    S.startedAt   = Date.now();    // fresh wall-clock anchor
    S.running     = snap.running;
    S.paused      = snap.paused !== false; // default to paused on restore for safety
    S.pausedAt    = S.paused ? Date.now() : null;
    S.log         = snap.log || [];
    S.halfDone    = snap.halfDone || false;
    S.speed       = snap.speed || 1;
    alertFired    = snap.alertFired || { fwd:false, ib:false, wings:false };
    S.lastRotation = snap.lastRotation || { fwd:0, ib:0, wings:0 };
    S.groupConfig  = snap.groupConfig  || {};

    // Fix up stintStart — these were wall-clock ms, but after a restore
    // they may be stale. Shift them forward so elapsed = 0 at restore point.
    // The total time up to restore is baked in by adjusting totalSecs.
    const now = Date.now();
    // stintStart is now game-seconds — players restart their stint from restore point
    Object.values(S.players).forEach(p => {
      if (p.onField && p.stintStart !== null) {
        p.stintStart = snap.gameTime; // stint restarts from restore gameTime
      }
    });
    return true;
  } catch(e) { return false; }
}

// ── HELPERS ──
function fmtTime(s) { s=Math.round(s); const m=Math.floor(s/60),sc=s%60; return m+':'+String(sc).padStart(2,'0'); }
function fmtMins(s) { return (Math.round(s)/60).toFixed(1)+'m'; }
function toast(msg) {
  let t = document.getElementById('toast-el');
  if (!t) { t=document.createElement('div'); t.id='toast-el'; t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0D1333;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;text-align:center;max-width:80%'; document.body.appendChild(t); }
  t.textContent=msg; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>{t.style.display='none'},2500);
}

// ── COUNTDOWN ──
function groupCountdown(g) {
  const cfg = gcfg(g.id);
  const rotSecs = cfg.rotMins * 60;
  const elapsed = S.gameTime - (S.lastRotation[g.id] || 0);
  const remaining = rotSecs - elapsed;
  if (remaining <= 0) {
    return `<span class="countdown-pill due">Sub now!</span>`;
  }
  const cls = remaining <= 60 ? 'soon' : '';
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  return `<span class="countdown-pill ${cls}">${m}:${String(s).padStart(2,'0')}</span>`;
}

// ── RENDER ──
function render() {
  const gt = liveGameTime();
  const pct = Math.min(gt/GAME_SECS*100, 100);
  document.getElementById('progress-fill').style.width = pct.toFixed(1)+'%';
  const minsLeft = Math.max(0, Math.floor((GAME_SECS-gt)/60));
  const cd = document.getElementById('clock-display');
  cd.textContent = fmtTime(gt);
  cd.className = 'clock-display'+(minsLeft<=5?' urgent':minsLeft<=15?' warning':'');

  let cpHtml='';
  GROUPS.forEach(g=>{
    const cfg=gcfg(g.id);
    const on=Object.values(S.players).filter(p=>p.group===g.id&&p.onField).length;
    const due=isRotationDue(g);
    cpHtml+=`<span class="count-pill ${due?'warn':on===cfg.onField?'ok':''}">${g.name.split(' ')[0]}: ${on}/${cfg.onField}${due?' ⚠':''}</span>`;
  });
  document.getElementById('player-counts').innerHTML = cpHtml;

  let gHtml='';
  GROUPS.forEach(g=>{
    const players=Object.values(S.players).filter(p=>p.group===g.id);
    const cfg=gcfg(g.id);
    const onCt=players.filter(p=>p.onField).length;
    const rotDue=isRotationDue(g);
    const nextOffArr=getNextOff(g.id,cfg.rotCount);
    const nextOnArr=getNextOn(g.id,cfg.rotCount);
    const nextOffIds=new Set(nextOffArr.map(p=>p.id));
    const nextOnIds=new Set(nextOnArr.map(p=>p.id));
    const canRotate=nextOffArr.length>0&&nextOnArr.length>0;

    let offHtml='', onHtml='';
    if(!nextOffArr.length){offHtml='<span class="next-none">—</span>';}
    else offHtml=nextOffArr.map((p,i)=>{
      const badge=g.rotCount>1?`<span class="nbadge">${i+1}</span>`:'';
      return `<div class="next-name-row">${badge}<span class="next-name">${p.name}</span><span class="next-time">${fmtMins(stintSecs(p))}</span></div>`;
    }).join('');
    if(!nextOnArr.length){onHtml='<span class="next-none">All on</span>';}
    else onHtml=nextOnArr.map((p,i)=>{
      const badge=g.rotCount>1?`<span class="nbadge">${i+1}</span>`:'';
      return `<div class="next-name-row">${badge}<span class="next-name">${p.name}</span><span class="next-time">${fmtMins(p.totalSecs)}</span></div>`;
    }).join('');

    gHtml+=`<div class="group-block">
      <div class="group-bar">
        <span class="gb-title">${g.name}</span>
        <span class="gb-meta">${onCt}/${cfg.onField}</span>
        ${groupCountdown(g)}
        ${canRotate?`<button class="rotate-btn${rotDue?' due':''}" onclick="doRotate('${g.id}')">${cfg.rotCount>1?'Rotate '+cfg.rotCount:'Rotate'}</button>`:''}
      </div>
      <div class="next-strip">
        <div class="next-cell nc-off"><div class="next-label">▼ Next off</div>${offHtml}</div>
        <div class="next-cell nc-on"><div class="next-label">▲ Next on</div>${onHtml}</div>
      </div>
      <div class="players-grid">`;

    players.forEach(p=>{
      const t=currentSecs(p), st=stintSecs(p);
      const isNextOff=nextOffIds.has(p.id), isNextOn=nextOnIds.has(p.id);
      let cc='player-card ', dc='pcdot ', sh='', bc='tf-gray';
      if(isNextOff){
        cc+='s-on'; // green card, same as regular on-field
        // Two dots: green + orange
        dc = 'dots-wrap';
        sh=`<span class="pc-status st-nextoff">▼ Next off</span>`;
        bc='tf-green';
      } else if(isNextOn){
        cc+='s-nexton'; dc+='pcdot d-nexton'; sh=`<span class="pc-status st-nexton">▲ Next on</span>`; bc='tf-blue';
      } else if(p.onField){
        cc+='s-on'; dc+='pcdot d-on'; sh=`<span class="pc-status st-on">On field</span>`; bc='tf-green';
      } else {
        cc+='s-bench'; dc+='pcdot d-bench'; sh=`<span class="pc-status st-bench">Bench</span>`;
      }
      const barPct=Math.min(t/GAME_SECS*100,100).toFixed(1);
      const timeStr=p.onField?`Total: ${fmtMins(t)} · Stint: ${fmtMins(st)}`:`Total: ${fmtMins(t)}`;
      const dotHtml = dc === 'dots-wrap'
        ? `<span class="dots-wrap"><span class="pcdot d-on"></span><span class="pcdot d-nextoff"></span></span>`
        : `<span class="${dc}"></span>`;
      gHtml+=`<div class="${cc}" onclick="togglePlayer('${p.id}')">
        <div class="pc-top"><span class="pc-name">${p.name}</span>${dotHtml}</div>
        <div class="pc-times">${timeStr}</div>${sh}
        <div class="timebar"><div class="timebar-fill ${bc}" style="width:${barPct}%"></div></div>
      </div>`;
    });
    gHtml+=`</div></div>`;
  });
  document.getElementById('groups-area').innerHTML=gHtml;

  const logHtml=S.log.slice(0,40).map(e=>{
    const ic=e.type==='on'?`<span class="log-icon li-on">ON</span>`:e.type==='off'?`<span class="log-icon li-off">OFF</span>`:e.type==='rot'?`<span class="log-icon li-rot">ROT</span>`:`<span class="log-icon li-sys">•</span>`;
    return `<div class="log-row"><span class="log-t">${fmtTime(e.t)}</span>${ic}<span class="log-msg">${e.msg}</span></div>`;
  }).join('');
  document.getElementById('log-inner').innerHTML=logHtml||`<div class="log-row"><span class="log-msg" style="color:var(--gray-mid)">No subs yet</span></div>`;
}

// ── INIT ──
buildSetup();

// Check for saved game on load
window.addEventListener('load', () => {
  const restored = tryRestore();
  if (restored) {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('halftime-btn').style.display = S.halfDone ? 'none' : 'block';
    if (S.gameTime >= GAME_SECS) document.getElementById('fulltime-banner').style.display = 'block';
    document.getElementById('pause-btn').textContent = S.paused ? 'Resume' : 'Pause';
    document.getElementById('pause-btn').classList.toggle('pause-active', S.paused);
    document.getElementById('resume-banner').style.display = 'block';
    // Restore speed button highlight
    [1,5,10,30].forEach(s=>{ const b=document.getElementById(`spd-${s}`); if(b) b.classList.toggle('active',s===S.speed); });
    startTicker();
    render();
  }
});

// Save on page visibility change (app backgrounded / screen locked)
document.addEventListener('visibilitychange', () => {
  if (document.hidden && S.running) {
    S.gameTime = liveGameTime();
    S.baseGameTime = S.gameTime;
    saveState();
  } else if (!document.hidden && S.running && !S.paused) {
    // Recalculate wall-clock anchor on return
    S.startedAt = Date.now();
    render();
  }
});
</script>
</body>
</html>
